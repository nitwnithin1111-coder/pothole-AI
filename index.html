<!DOCTYPE html>
<html>
<head>
<title>PotholeAI Live Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#header{
background:#1E3A5F;
color:white;
padding:12px;
font-weight:bold;
}
#map{
height:calc(100vh - 50px);
}
</style>
</head>

<body>

<div id="header">
PotholeAI by Nithin — Live Pothole Map
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// Replace with your village coordinates
var map = L.map('map').setView([17.3850,78.4867],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map);

// Test pothole marker
L.marker([17.3850,78.4867])
.addTo(map)
.bindPopup("Pothole Test Marker");

</script>

</body>
</html>
